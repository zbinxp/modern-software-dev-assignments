<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Modern Software Dev Starter</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main>
      <h1>Modern Software Dev Starter (Week 6)</h1>

      <section>
        <h2>Notes</h2>
        <form id="note-form">
          <input id="note-title" placeholder="Title" required minlength="1" maxlength="200" />
          <input id="note-content" placeholder="Content" required />
          <button type="submit">Add</button>
        </form>
        <div style="margin:.25rem 0;">
          <input id="note-search" placeholder="Search" />
          <button id="note-search-btn">Search</button>
        </div>
        <div id="note-edit-form" style="display:none; margin:.25rem 0; padding:.5rem; border:1px solid #ccc;">
          <h3>Edit Note</h3>
          <input id="edit-note-id" type="hidden" />
          <input id="edit-note-title" placeholder="Title" required minlength="1" maxlength="200" />
          <input id="edit-note-content" placeholder="Content" required />
          <button id="save-note-btn">Save</button>
          <button id="cancel-edit-btn">Cancel</button>
        </div>
        <div id="note-error" style="color:red; margin:.25rem 0;"></div>
        <ul id="notes"></ul>
      </section>

      <section>
        <h2>Action Items</h2>
        <form id="action-form">
          <input id="action-desc" placeholder="Description" required />
          <button type="submit">Add</button>
        </form>
        <div style="margin:.25rem 0;">
          <label><input type="checkbox" id="filter-completed" /> Show completed only</label>
        </div>
        <ul id="actions"></ul>
      </section>
    </main>

    <script src="/static/app.js"></script>
  </body>
  </html>
